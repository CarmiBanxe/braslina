version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis, minio]
    volumes: ["./storage:/app/storage"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: braslina
      POSTGRES_USER: braslina
      POSTGRES_PASSWORD: braslina_dev
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: braslina
      MINIO_ROOT_PASSWORD: braslina_dev
    ports: ["9002:9000", "9003:9001"]
    volumes: ["minio_data:/data"]

  celery-worker:
    build: .
    command: celery -A src.celery_app worker -l info
    env_file: .env
    depends_on: [db, redis]

  celery-beat:
    build: .
    command: celery -A src.celery_app beat -l info
    env_file: .env
    depends_on: [redis]

  n8n:
    image: n8nio/n8n
    ports: ["5680:5678"]
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: banxe_n8n
    volumes: ["n8n_data:/home/node/.n8n"]

volumes:
  pgdata:
  minio_data:
  n8n_data:
