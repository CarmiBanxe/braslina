name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: braslina
          POSTGRES_PASSWORD: braslina_dev
          POSTGRES_DB: braslina
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        continue-on-error: true  # TODO: fix mypy errors and make this blocking
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://braslina:braslina_dev@localhost:5432/braslina
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest --cov=src --cov-fail-under=80 --cov-report=term-missing -v
