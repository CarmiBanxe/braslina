version: "3.8"

services:
  braslina-api:
    build: .
    container_name: braslina-api
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "8000:8000"
    depends_on:
      braslina-db:
        condition: service_healthy
      braslina-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  braslina-db:
    image: postgres:15-alpine
    container_name: braslina-db
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  braslina-redis:
    image: redis:7-alpine
    container_name: braslina-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  braslina-minio:
    image: minio/minio:latest
    container_name: braslina-minio
    restart: unless-stopped
    command: server /data --console-address ":9003"
    env_file: .env.prod
    volumes:
      - miniodata:/data
    ports:
      - "9002:9000"
      - "9003:9003"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
  miniodata:
